<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Comitê de IA Esportiva</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,00,0,0.1); }
        h1 { color: #333; text-align: center; }
        input[type="text"] { width: 70%; padding: 10px; margin-right: 10px; border-radius: 4px; border: 1px solid #ccc; }
        button { padding: 10px 20px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #218838; }
        .message-box { margin-top: 20px; border-left: 5px solid #007bff; padding: 15px; background: #e9ecef; border-radius: 4px; margin-bottom: 15px; }
        .agent-name { font-weight: bold; color: #007bff; margin-bottom: 5px; font-size: 1.1em;}
        #loader { display: none; margin-top: 20px; font-style: italic; color: #666; }
        pre { white-space: pre-wrap; font-family: inherit; margin: 0; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏟️ Comitê de Análise Esportiva IA</h1>
    <div style="text-align: center; margin-bottom: 20px;">
        <input type="text" id="confrontoInput" placeholder="Ex: Real Madrid x Manchester City">
        <button onclick="iniciarAnalise()">Analisar</button>
    </div>

    <div id="loader">Os agentes estão trabalhando (isso pode levar alguns segundos)...</div>
    <div id="chatArea"></div>
</div>

<script>
    async function iniciarAnalise() {
        const confronto = document.getElementById("confrontoInput").value;
        const chatArea = document.getElementById("chatArea");
        const loader = document.getElementById("loader");
        
        if (!confronto) return alert("Digite um confronto!");

        chatArea.innerHTML = "";
        loader.style.display = "block";

        try {
            const response = await fetch("/analisar", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ confronto: confronto })
            });
            const data = await response.json();

            loader.style.display = "none";

            if(data.status === "sucesso") {
                data.conversa.forEach(msg => {
                    chatArea.innerHTML += `
                        <div class="message-box">
                            <div class="agent-name">🤖 ${msg.agente}</div>
                            <pre>${msg.mensagem}</pre>
                        </div>
                    `;
                });
            }
        } catch (error) {
            loader.style.display = "none";
            chatArea.innerHTML = `<p style="color:red;">Erro ao contatar os agentes.</p>`;
        }
    }
</script>

</body>
</html>
